<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Sillage Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

  <main class="login-page">
    <div class="login-card">
      <div class="login-card__logo">Sillage</div>
      <div class="login-card__eyebrow">Acceso de administrador</div>
      <div class="login-card__divider"></div>

      <div class="login-card__error" id="login-error" style="display:none"></div>

      <div class="login-card__group">
        <label class="login-card__label" for="correo">Correo electrónico</label>
        <input class="login-card__input" type="email" id="correo" placeholder="admin@sillage.com">
      </div>

      <div class="login-card__group">
        <label class="login-card__label" for="password">Contraseña</label>
        <input class="login-card__input" type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn btn--primary login-card__btn" id="login-btn">Ingresar al panel</button>

      <p class="login-card__note">
        Área exclusiva para administradores.
        <a href="/pages/catalogo.html">Regresar al catálogo</a>
      </p>
    </div>
  </main>

  <script type="module" src="/assets/js/admin.js"></script>
</body>
</html>
