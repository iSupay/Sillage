<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Sillage Admin</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

  <nav class="panel-nav">
    <div class="panel-nav__logo">
      Sillage <span>Admin</span>
    </div>
    <div class="panel-nav__links">
      <button class="panel-nav__logout" id="logout-btn">Cerrar sesión</button>
    </div>
  </nav>

  <div class="panel-layout">
    <aside class="panel-sidebar">
      <div class="panel-sidebar__section">Secciones</div>
      <button class="panel-sidebar__item active" data-seccion="perfumes">Perfumes</button>
      <button class="panel-sidebar__item" data-seccion="categorias">Categorías</button>
    </aside>

    <main class="panel-main">

      <!-- ── SECCIÓN PERFUMES ── -->
      <div class="panel-seccion" id="seccion-perfumes">
        <div class="panel-main__header">
          <div>
            <h1 class="panel-main__title">Gestión de Perfumes</h1>
            <div class="panel-main__sub">Administra el catálogo completo de fragancias</div>
          </div>
          <button class="btn btn--primary" id="btn-agregar">+ Agregar perfume</button>
        </div>

        <div class="panel-stats">
          <div class="panel-stat">
            <div class="panel-stat__num" id="stat-perfumes">—</div>
            <div class="panel-stat__label">Perfumes</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat__num" id="stat-marcas">—</div>
            <div class="panel-stat__label">Marcas</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat__num" id="stat-familias">—</div>
            <div class="panel-stat__label">Familias</div>
          </div>
          <div class="panel-stat">
            <div class="panel-stat__num" id="stat-notas">—</div>
            <div class="panel-stat__label">Notas</div>
          </div>
        </div>

        <div class="panel-search-row">
          <input class="panel-search" type="text" id="perfume-search" placeholder="Buscar por nombre o marca...">
        </div>

        <table class="panel-table">
          <thead>
            <tr>
              <th>Perfume</th>
              <th>Tipo</th>
              <th>Familia</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="perfumes-tbody">
            <tr>
              <td colspan="5" style="text-align:center;color:var(--color-text-muted)">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ── SECCIÓN CATEGORÍAS ── -->
      <div class="panel-seccion" id="seccion-categorias" style="display:none">
        <div class="panel-main__header">
          <div>
            <h1 class="panel-main__title">Gestión de Categorías</h1>
            <div class="panel-main__sub">Administra las categorías del catálogo</div>
          </div>
        </div>

        <div class="panel-tabs">
          <button class="panel-tab active" data-tab="marcas">Marcas</button>
          <button class="panel-tab" data-tab="tipos_perfume">Tipos</button>
          <button class="panel-tab" data-tab="familias_olfativas">Familias olfativas</button>
          <button class="panel-tab" data-tab="notas_aromaticas">Notas aromáticas</button>
          <button class="panel-tab" data-tab="ocasiones">Ocasiones</button>
        </div>

        <div class="panel-tab-content active" id="tab-marcas">
          <div id="cat-marcas"></div>
        </div>
        <div class="panel-tab-content" id="tab-tipos_perfume">
          <div id="cat-tipos_perfume"></div>
        </div>
        <div class="panel-tab-content" id="tab-familias_olfativas">
          <div id="cat-familias_olfativas"></div>
        </div>
        <div class="panel-tab-content" id="tab-notas_aromaticas">
          <div id="cat-notas_aromaticas"></div>
        </div>
        <div class="panel-tab-content" id="tab-ocasiones">
          <div id="cat-ocasiones"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal agregar/editar perfume -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal__header">
        <div class="modal__title" id="modal-titulo">Agregar perfume</div>
        <button class="modal__close" id="modal-close">✕</button>
      </div>

      <form id="modal-form">
        <input type="hidden" id="modal-id">

        <div class="modal__grid">
          <div class="modal__group">
            <label class="modal__label" for="modal-nombre">Nombre</label>
            <input class="modal__input" type="text" id="modal-nombre" required>
          </div>
          <div class="modal__group">
            <label class="modal__label" for="modal-precio">Precio (USD)</label>
            <input class="modal__input" type="number" id="modal-precio" min="0" step="0.01" required>
          </div>
        </div>

        <div class="modal__group">
          <label class="modal__label" for="modal-desc">Descripción</label>
          <textarea class="modal__textarea" id="modal-desc"></textarea>
        </div>

        <div class="modal__grid">
          <div class="modal__group">
            <label class="modal__label" for="modal-marca">Marca</label>
            <select class="modal__select" id="modal-marca" required></select>
          </div>
          <div class="modal__group">
            <label class="modal__label" for="modal-tipo">Tipo</label>
            <select class="modal__select" id="modal-tipo" required></select>
          </div>
        </div>

        <div class="modal__grid">
          <div class="modal__group">
            <label class="modal__label" for="modal-familia">Familia olfativa</label>
            <select class="modal__select" id="modal-familia" required></select>
          </div>
          <div class="modal__group">
            <label class="modal__label" for="modal-genero">Género</label>
            <select class="modal__select" id="modal-genero">
              <option value="">Selecciona...</option>
              <option value="masculino">Masculino</option>
              <option value="femenino">Femenino</option>
              <option value="unisex">Unisex</option>
            </select>
          </div>
        </div>

        <!-- Sección de notas -->
        <div class="modal__group">
          <label class="modal__label">Notas aromáticas</label>
          <div class="modal__grid" style="grid-template-columns:1fr 1fr 1fr;">
            <select class="modal__select nota-select" data-tipo="salida" id="nota-salida">
              <option value="">Nota de salida...</option>
            </select>
            <select class="modal__select nota-select" data-tipo="corazon" id="nota-corazon">
              <option value="">Nota de corazón...</option>
            </select>
            <select class="modal__select nota-select" data-tipo="fondo" id="nota-fondo">
              <option value="">Nota de fondo...</option>
            </select>
          </div>
          <button type="button" class="btn btn--outline" style="margin-top:8px;padding:6px 14px;font-size:12px;" id="btn-add-nota-row">+ Agregar nota</button>
          <div id="notas-agregadas" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;"></div>
        </div>

        <div class="modal__footer">
          <button type="button" class="btn btn--outline" id="modal-cancelar">Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/admin.js"></script>
</body>
</html>
